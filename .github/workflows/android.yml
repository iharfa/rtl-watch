name: android-apk

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - '.github/workflows/android.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # publish the APK as a release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci
      - run: npx cap sync android
      - run: chmod +x android/gradlew
      - run: cd android && ./gradlew assembleDebug --no-daemon
      - run: cp android/app/build/outputs/apk/debug/app-debug.apk buswatch.apk
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: BusWatch Android (latest)
          body: >
            Debug APK of the BusWatch Android shell. Records trips with the screen
            off via a foreground service. Install requires allowing installs from
            unknown sources. Loads the live app from rtl-watch.vercel.app.
          files: buswatch.apk
